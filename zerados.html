<!DOCTYPE html>

<html lang="pt-BR">
  <head>
    <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./img/limpeza.png" type="image/png" />
    <link rel="stylesheet" href="styles/style.css" />
    <title>Otimizador de dados 17.13</title>
  </head>

  <body>
    <header>
      <img class="icone" src="./img/limpeza.png" alt="Limpeza de dados"/>
      <a href="index.html">Home</a>
      <a href="zerados.html">Zerados</a>
      <a href="pedidos.html">Pedidos no fornecedor</a>
    </header>
    <h1>Material zerado no CD</h1>
    <div class="container">
      <button class="container-botoes" id="umaOcorrencia">
        Manter uma Ocorrência
      </button>

      <button class="container-botoes" id="limpaLocal">Limpar Dados</button>

      <button class="container-botoes" id="botao">Listar dados</button>
    </div>
    <div class="container__radio">
      <label>
        <input type="radio" class="botaoRadio" name="colunas" value="1" /> 1
        coluna
      </label>
      <label>
        <input
          type="radio"
          class="botaoRadio"
          name="colunas"
          value="5"
          checked
        />
        5 colunas
      </label>
      <label>
        <input type="radio" class="botaoRadio" name="colunas" value="10" /> 10
        colunas
      </label>
      <label>
        <input type="radio" class="botaoRadio" name="colunas" value="15" /> 15
        colunas
      </label>
      <label>
        <input type="radio" class="botaoRadio" name="colunas" value="20" /> 20
        colunas
      </label>
    </div>
    <div class="container__resposta">
      <pre id="resposta"></pre>
    </div>
    <script src="./scripts/zerados.js"></script>
  </body>
</html>
